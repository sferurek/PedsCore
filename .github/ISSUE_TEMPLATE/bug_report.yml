name: Bug report
description: Report a bug or unexpected behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include patient-identifiable information or real clinical cases.
  - type: input
    id: route
    attributes:
      label: Route or page
      description: Example: /es/tools/who-growth
    validations:
      required: true
  - type: input
    id: browser_device
    attributes:
      label: Browser and device
      description: Include browser, version, OS and device if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots only if they contain no patient data or real clinical cases.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details that may help reproduce the issue.
    validations:
      required: false
